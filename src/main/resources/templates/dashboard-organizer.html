<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Organizer Dashboard')}"></head>
<body class="page-wrapper">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Organizer Dashboard</h1>
        <p>Welcome, <span th:text="${session.user.name}">Organizer</span>. Manage your event proposals and track their approval status.</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="section">
        <div class="section-header">
            <h2>My Events</h2>
            <a th:href="@{/events/new}" class="btn btn-primary">Create New Event</a>
        </div>

        <div th:if="${events.isEmpty()}" class="empty-state">
            <p>You have not created any events yet.</p>
            <a th:href="@{/events/new}" class="btn btn-primary mt-2">Create Your First Event</a>
        </div>

        <div class="events-grid" th:if="${!events.isEmpty()}">
            <div class="event-card" th:each="event : ${events}">
                <div class="event-card-body">
                    <h3 class="event-card-title">
                        <a th:href="@{'/events/' + ${event.id} + '/detail'}"
                           th:text="${event.title}">Event Title</a>
                    </h3>
                    <p class="event-card-desc" th:text="${event.description}">Description</p>
                    <div class="event-card-meta">
                        <span th:text="${event.date}">2026-01-01</span>
                        <span class="badge"
                              th:classappend="'badge-' + ${#strings.replace(#strings.toLowerCase(event.status.name()), '_', '-')}"
                              th:text="${#strings.replace(event.status.name(), '_', ' ')}">STATUS</span>
                    </div>
                </div>
                <div class="event-card-footer">
                    <a th:href="@{'/events/' + ${event.id} + '/detail'}"
                       class="btn btn-sm btn-secondary">View</a>
                    <form th:if="${event.status.name() == 'DRAFT'}"
                          th:action="@{'/events/' + ${event.id} + '/submit'}" method="post" class="inline-form">
                        <button type="submit"
                                class="btn btn-sm btn-primary"
                                th:attr="data-event-id=${event.id},data-event-status='SUBMITTED',data-requesting-user-id=${session.user.id}">Submit for Approval</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
