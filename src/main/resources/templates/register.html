<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register - Campus Event Platform')}"></head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="brand-section">
            <div class="brand-name">Smart Campus Event Platform</div>
            <div class="brand-tagline">Event &amp; Resource Coordination</div>
        </div>

        <h1>Create Account</h1>
        <p class="subtitle">Register to start managing campus events</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-input"
                       placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input"
                       placeholder="you@campus.edu" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="role">Role</label>
                <select id="role" name="role" class="form-select" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="STUDENT">Student</option>
                    <option value="ORGANIZER">Club Organizer</option>
                    <option value="FACULTY">Faculty Advisor</option>
                    <option value="ADMIN">Campus Administrator</option>
                    <option value="SPONSOR">Sponsor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in here</a>
        </div>
    </div>
</div>
</body>
</html>
